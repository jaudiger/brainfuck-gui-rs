name: Continuous Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: jaudiger/reusable-workflows/.github/workflows/deploy-rust-cloudflare-pages.yml@af70992c9dcbb3bf0a833629b18cb661b7c616fe
    secrets: inherit
